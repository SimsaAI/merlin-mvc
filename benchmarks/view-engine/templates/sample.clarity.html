{% extends "layouts/main" %}

{% block content %}
  {% include "partials/header" %}
  <ul>
  {% for item, idx in items %}
    <li{% if idx % 2 == 0 %} class="even"{% endif %}>
      {{ item }}
      <div class="extras">
        {% for j in 0...9 %}
          <span>{{ item ~ '-' ~ j |> upper }}</span>
        {% endfor %}
      </div>
    </li>
  {% endfor %}
  </ul>
{% endblock %}
